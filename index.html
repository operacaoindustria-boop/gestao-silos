    <script>
        // --- CONFIGURAÇÃO INICIAL E ESTADO ---
        // Firebase Configuration (para o seu projeto 'integracaocoi')
        const firebaseConfig = {
            apiKey: "AIzaSyBe-R_7RcO4q34u9jrR4SXoOtfTppQ25FA",
            authDomain: "integracaocoi.firebaseapp.com",
            projectId: "integracaocoi",

            messagingSenderId: "177203745489",

        };
        // Initialize Firebase e obtenha a instância do Firestore
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); // Agora 'db' pode ser usado para interagir com o Firestore
        const auth = firebase.auth(); // Instância do Firebase Authentication

        const FIXED_SILOS = [
            ...Array.from({ length: 16 }, (_, i) => `PULMÃO ${String(i + 1).padStart(2, '0')}`), // PULMÃO 01 to PULMÃO 16
            ...Array.from({ length: 4 }, (_, i) => `REPASSE ${String(i + 1).padStart(2, '0')}`) // REPASSE 01 to REPASSE 04
        ];

        let state = {
            view: 'dashboard', // dashboard | beneficiamento | managementDashboard
            selectedSiloId: null,
            siloMap: {},
            completedHistory: [],
            searchTerm: '', // Usado para filtros futuros, se implementado
            errorMessage: null, // Para exibir erros ao usuário
            // Estados temporários para a aba de beneficiamento
            form: {
                // Adicionei campos de data para as horas, para cálculos mais precisos
                // e para evitar problemas com horários que cruzam a meia-noite
                responsible: '',
                startTime: { date: '', hour: '' },
                endTime: { date: '', hour: '' },
                stopStart: { date: '', hour: '' },

            },
            confirmation: {

                onConfirm: () => {},
            managementTab: 'global' // Aba ativa no dashboard gerencial
            }
        };

        // --- FUNÇÕES DE UTILIDADE ---

        function getSiloCapacity(name) {
            const num = parseInt(name.match(/\d+/)?.[0]);
            if (name.includes('REPASSE')) return 72;
            const silos72 = [1, 8, 9, 16];
            return silos72.includes(num) ? 72 : 84;
        }

        function highlightNumbers(text) {
            if (!text) return '';
            return text.toString().replace(/(\d+)/g, '<span class="bg-yellow-300 text-slate-900 px-1 rounded font-black shadow-sm mx-0.5 border border-yellow-400">$1</span>');
        }

        function calculateAutoTons(o1, o2) {
            const text = `${o1} ${o2}`.toLowerCase();
            const matches = text.match(/\d+/g);
            if (matches && (text.includes('secador') || text.includes('sec'))) {
                const unique = [...new Set(matches)];
                return unique.length * 12;
            }
            return 0;
        }

        function normalizeSiloName(name) {
            if (!name) return null;
            const clean = name.toString().toUpperCase().trim();
            const numMatch = clean.match(/\d+/);
            const num = numMatch ? String(numMatch[0]).padStart(2, '0') : null;
            if (!num) return null;
            
            if (clean.includes('R')) return `REPASSE ${num}`;
            return `PULMÃO ${num}`;
        }

        function getRhythmColor(rhythm) {
            const r = parseFloat(rhythm);
            if (r >= 75) return { text: 'text-green-400', border: 'border-green-500/30', bg: 'bg-green-500/10' };
            if (r >= 60) return { text: 'text-yellow-400', border: 'border-yellow-500/30', bg: 'bg-yellow-500/10' };
            return { text: 'text-red-400', border: 'border-red-500/30', bg: 'bg-red-500/10' };
        }

        function calculateGlobalMetrics() {
            const history = state.completedHistory;
            if (history.length === 0) {
                return {
                    totalVolume: 0, totalDischarges: 0, averageRhythm: 0, goalAdherence: 0,
                    dailyVolume: {}, rhythmByCultivar: {}, allRhythms: [], totalStoppageHours: 0
                };
            }
            // New aggregations for Comparative Analysis tab
            let volumeByCultivar = {};
            let siloPerformanceSummary = {};
            // New aggregations for Stoppages, Shift, etc.
            let stoppageReasons = {};
            let shiftProduction = { 'Turno A': { volume: 0, count: 0 }, 'Turno B': { volume: 0, count: 0 }, 'Turno C': { volume: 0, count: 0 } };
            let userProduction = {};

            const RHYTHM_GOAL = 75;
            let totalVolume = 0;
            let totalRhythm = 0;
            let metGoalCount = 0;
            let totalStoppageHours = 0;
            const dailyVolume = {};
            const rhythmByCultivar = {};
            const allRhythms = [];

            history.forEach(item => {
                const perf = item.performance;
                const vol = parseFloat(item.tonelagem) || 0;
                const rhythm = parseFloat(perf.rhythm) || 0;
                const stoppage = parseFloat(perf.stoppageHours) || 0;
                const date = perf.inicio.split(' ')[0];
                const shift = 'Turno A'; // Placeholder, needs real shift data

                totalVolume += vol;
                totalRhythm += rhythm;
                totalStoppageHours += stoppage;
                if (rhythm >= RHYTHM_GOAL) metGoalCount++;

                // Agrupar por dia
                dailyVolume[date] = (dailyVolume[date] || 0) + vol;

                // Agrupar por cultivar
                if (!rhythmByCultivar[item.cultivar]) {
                    rhythmByCultivar[item.cultivar] = { totalRhythm: 0, count: 0 };
                }
                rhythmByCultivar[item.cultivar].totalRhythm += rhythm;
                rhythmByCultivar[item.cultivar].count++;

                // Agrupar por cultivar (volume)
                volumeByCultivar[item.cultivar] = (volumeByCultivar[item.cultivar] || 0) + vol;

                // Agrupar por silo (para radar chart)
                if (!siloPerformanceSummary[item.name]) {
                    siloPerformanceSummary[item.name] = {
                        totalVolume: 0, totalRhythm: 0, rhythmCount: 0, totalStoppageHours: 0, totalDischarges: 0
                    };
                }
                siloPerformanceSummary[item.name].totalVolume += vol;
                siloPerformanceSummary[item.name].totalRhythm += rhythm;
                siloPerformanceSummary[item.name].rhythmCount++;
                siloPerformanceSummary[item.name].totalStoppageHours += stoppage;
                siloPerformanceSummary[item.name].totalDischarges++;

                // Agrupar paradas por motivo
                if (perf.parada && perf.parada !== 'Nenhuma' && stoppage > 0) {
                    stoppageReasons[perf.parada] = (stoppageReasons[perf.parada] || 0) + stoppage;
                }

                // Agrupar produção por turno
                if (shiftProduction[shift]) {
                    shiftProduction[shift].volume += vol;
                    shiftProduction[shift].count++;
                }

                // Agrupar produção por usuário
                const user = perf.responsavel || 'Desconhecido';
                userProduction[user] = (userProduction[user] || 0) + vol;

                allRhythms.push({ x: vol, y: rhythm, silo: item.name });
            });

            const avgRhythmByCultivar = {};
            for (const cultivar in rhythmByCultivar) {
                const data = rhythmByCultivar[cultivar];
                avgRhythmByCultivar[cultivar] = (data.totalRhythm / data.count).toFixed(2);
            }
            
            const processedSiloPerformance = {};
            for (const siloName in siloPerformanceSummary) {
                const data = siloPerformanceSummary[siloName];
                processedSiloPerformance[siloName] = {
                    averageRhythm: parseFloat((data.totalRhythm / data.rhythmCount).toFixed(2)),
                    totalVolume: parseFloat(data.totalVolume.toFixed(2)),
                    totalStoppageHours: parseFloat(data.totalStoppageHours.toFixed(2)),
                    totalDischarges: data.totalDischarges
                };
            }

            return {
                totalVolume: totalVolume.toFixed(2),
                totalDischarges: history.length,
                averageRhythm: (totalRhythm / history.length).toFixed(2),
                goalAdherence: ((metGoalCount / history.length) * 100).toFixed(1),
                totalStoppageHours: totalStoppageHours.toFixed(2),
                dailyVolume: Object.entries(dailyVolume).sort((a, b) => new Date(a[0]) - new Date(b[0])),
                rhythmByCultivar: Object.entries(avgRhythmByCultivar).sort((a, b) => b[1] - a[1]), // For Performance Global
                volumeByCultivar: Object.entries(volumeByCultivar).sort((a, b) => b[1] - a[1]), // For Comparative Analysis
                stoppageReasons: Object.entries(stoppageReasons).sort((a, b) => b[1] - a[1]), // For Stoppages
                shiftProduction, // For Shift Production
                userProduction: Object.entries(userProduction).sort((a, b) => b[1] - a[1]), // For Shift Production
                siloPerformanceSummary: processedSiloPerformance, // For Comparative Analysis
                allRhythms,
                RHYTHM_GOAL
            };
        }


        // --- LÓGICA DE NEGÓCIO ---

        async function processImport() {
            const rawData = document.getElementById('raw-data-input').value;
            if (!rawData.trim()) return;

            const rows = rawData.split('\n');
            const newSilosFromPaste = {}; // <-- Variável que faltava

            rows.forEach(row => {
                const col = row.split('\t');
                if (col.length < 5 || !col[1] || row.toLowerCase().includes('tipo de amostra')) return;
                
                const normName = normalizeSiloName(col[1]);
                if (normName && FIXED_SILOS.includes(normName)) {
                    const existingSiloData = state.siloMap[normName];
                    const newDataColeta = col[2] || '-';
                    const newHoraInicio = col[5] || '-';

                    // Lógica de "inteligência": Detecta se é uma carga nova ou a mesma.
                    const isNewLoad = !existingSiloData || 
                                      existingSiloData.dataColeta !== newDataColeta || 
                                      existingSiloData.horaInicio !== newHoraInicio;

                    const autoTons = calculateAutoTons(col[3], col[4]);
                    const mixQty = parseInt(col[14]) || 0;

                    const siloDataForUpdate = {
                        ...existingSiloData, // Começa com os dados existentes para preservar status e performance
                        tipoAmostra: col[0] || '-', // E atualiza com os dados da planilha
                        dataColeta: newDataColeta,
                        origem1: col[3] || '',
                        origem2: col[4] || '',
                        horaInicio: newHoraInicio,
                        respColeta: col[6] || '-',
                        cultivar: col[9] || '-',
                        umidade: col[10] || '-',
                        temp: col[11] || '-',
                        misturaQtde: mixQty,
                        misturaCultivar: col[15] || '',
                        analista: col[17] || '-',
                        statusLASA: col[18] || 'EM ANÁLISE',
                        tonelagem: autoTons > 0 ? autoTons : (existingSiloData?.tonelagem || 0),
                        lastUpdate: new Date().toISOString()
                    };

                    if (isNewLoad) {
                        // Se for uma carga nova, reseta o status e a performance.
                        siloDataForUpdate.statusBeneficiamento = 'Irá Beneficiar';
                        siloDataForUpdate.performance = null;
                    }
                    newSilosFromPaste[normName] = siloDataForUpdate;
                }
            });

            const batch = db.batch();
            for (const name in newSilosFromPaste) {
                const siloData = newSilosFromPaste[name];
                const docRef = db.collection('silosQueue').doc(name); // Usar o nome do silo como ID do documento
                batch.set(docRef, siloData, { merge: true }); // Usa SET com MERGE para garantir que não sobrescreva campos se a lógica falhar
            }

            try {
                await batch.commit();
                document.getElementById('raw-data-input').value = ''; // Limpar input após sucesso
            } catch (error) {
                console.error("Erro ao sincronizar silos com Firestore:", error);
                state.errorMessage = { title: "Erro de Sincronização", message: "Não foi possível sincronizar os dados da planilha com o Firebase." };
                render();
            }
        }

        function updateSiloTonnage(name, inputElement) {
            const capacity = getSiloCapacity(name);
            let value = parseFloat(inputElement.value) || 0;

            if (value > capacity) {
                state.errorMessage = {
                    title: "Capacidade Excedida",
                    message: `A capacidade máxima para o ${name} é de ${capacity} toneladas. O valor foi ajustado para o máximo permitido.`,
                    silo: name
                };
                value = capacity; // Ajusta o valor para a capacidade máxima
                inputElement.value = value; // Atualiza o campo de input visualmente
                render(); // Mostra o modal de erro
            }

            db.collection('silosQueue').doc(name).update({ tonelagem: value });
        }
        async function updateSiloStatus(name, newStatus) {
            const data = state.siloMap[name];
            if (newStatus === 'Em Beneficiamento' && (!data.tonelagem || data.tonelagem <= 0)) {
                state.errorMessage = {
                    title: "Silo Vazio",
                    message: `Informe a tonelagem do ${name} antes de iniciar o beneficiamento.`,
                    silo: name
                };
                render();
                return;
            }
            
            try {
                const siloRef = db.collection('silosQueue').doc(name);
                await siloRef.update({
                    statusBeneficiamento: newStatus,
                    lastUpdate: new Date().toISOString()
                });

                if (newStatus === 'Em Beneficiamento') {
                    state.selectedSiloId = name;
                    state.view = 'beneficiamento';
                    resetForm();
                    render(); // Renderiza imediatamente para mudar a view, o listener atualizará o siloMap
                }
            } catch (error) {
                console.error(`Erro ao atualizar status do silo ${name}:`, error);
                state.errorMessage = { title: "Erro ao Atualizar Status", message: `Não foi possível atualizar o status do silo ${name} no Firebase.` };
                render();
            }
        }

        // Function to handle confirmation before updating silo status
        function confirmStatusChange(name, newStatus) {
            let title = 'Confirmar Alteração';
            let message = `Deseja realmente alterar o status do silo <strong>${name}</strong> para <strong>"${newStatus}"</strong>?`;
            let icon = 'help-circle';
            let color = 'bg-slate-800';

            const siloData = state.siloMap[name];
            // Lógica de "virada de chave": checa se o silo já foi beneficiado e tem dados de performance
            if (newStatus === 'Em Beneficiamento' && siloData?.statusBeneficiamento === 'Beneficiado' && siloData?.performance) {
                state.confirmation = {
                    show: true,
                    title: 'Silo Já Beneficiado',
                    message: `Este silo já foi processado. Deseja <strong>editar os parâmetros</strong> de descarga existentes?`,
                    icon: 'edit',
                    color: 'bg-yellow-500',
                    onConfirm: () => {
                        state.selectedSiloId = name;
                        state.view = 'beneficiamento';
                        resetForm(siloData.performance); // Preenche o form com dados existentes
                        render();
                    }
                };
                render();
                return; // Interrompe o fluxo normal
            }
            if (newStatus === 'Em Beneficiamento') {
                title = 'Iniciar Beneficiamento?';
                message = `Você será redirecionado para a tela de lançamento de performance do silo <strong>${name}</strong>. Confirma?`;
                icon = 'play-circle';
                color = 'bg-blue-600';
            } else if (newStatus === 'Beneficiado') {
                title = 'Marcar como Concluído?';
                message = `O silo <strong>${name}</strong> será marcado como "Concluído". Esta ação não pode ser desfeita facilmente.`;
                icon = 'check-circle';
                color = 'bg-slate-500';
            } else if (newStatus === 'Irá Beneficiar') {
                title = 'Marcar como Aguardando?';
                message = `O silo <strong>${name}</strong> voltará para o status "Aguardando".`;
                icon = 'clock';
                color = 'bg-amber-500';
            }

            state.confirmation = {
                show: true,
                title, message, icon, color,
                onConfirm: () => updateSiloStatus(name, newStatus)
            };

            render();
        }

        function setNow(field) {
            const now = new Date();
            const d = now.toISOString().split('T')[0];
            const h = now.toTimeString().split(' ')[0].substring(0, 5);
            
            if (field === 'start') state.form.startTime = { date: d, hour: h };
            if (field === 'end') state.form.endTime = { date: d, hour: h };
            if (field === 'stopS') state.form.stopStart = { date: d, hour: h };
            if (field === 'stopE') state.form.stopEnd = { date: d, hour: h };
            updateBeneficiamentoUI(); // Chamada para atualizar apenas a UI de beneficiamento
        }
        function resetForm(existingPerformance = null) {
            if (existingPerformance) {
                // Preenche o formulário com dados de um beneficiamento existente para edição
                const [startDate, startHour] = existingPerformance.inicio.split(' ');
                const [endDate, endHour] = existingPerformance.fim.split(' ');
                state.form = {
                    responsible: existingPerformance.responsavel || '',
                    startTime: { date: startDate, hour: startHour },
                    endTime: { date: endDate, hour: endHour },
                    stopStart: { date: '', hour: '' }, // Paradas não são salvas em detalhe, então resetamos
                    stopEnd: { date: '', hour: '' },
                    stopReason: existingPerformance.parada === 'Nenhuma' ? '' : existingPerformance.parada,
                    tonelagem: state.siloMap[state.selectedSiloId]?.performance?.tonelagem || state.siloMap[state.selectedSiloId]?.tonelagem || 0
                };
            } else {
                // Inicia um formulário novo/vazio
                const selectedSiloTonnage = state.siloMap[state.selectedSiloId]?.tonelagem || 0;
                state.form = {
                    responsible: '', startTime: { date: '', hour: '' }, endTime: { date: '', hour: '' },
                    stopStart: { date: '', hour: '' }, stopEnd: { date: '', hour: '' }, stopReason: '',
                    tonelagem: selectedSiloTonnage
                };
            }
        }
        function calculateMetrics() {
            const f = state.form;
            if (!f.startTime.date || !f.endTime.date) return null;

            const start = new Date(`${f.startTime.date}T${f.startTime.hour}`);
            const end = new Date(`${f.endTime.date}T${f.endTime.hour}`);
            const tons = f.tonelagem || 0; // Usa a tonelagem do formulário

            let totalMs = Math.max(0, end - start); // Garante que não seja negativo
            const totalHours = totalMs / (1000 * 60 * 60);

            if (totalMs <= 0) return { rhythm: 0, effectiveHours: 0, stoppageHours: 0, totalHours: 0 };

            let stopMs = 0;
            if (f.stopStart.date && f.stopEnd.date) {
                const sS = new Date(`${f.stopStart.date}T${f.stopStart.hour}`);
                const sE = new Date(`${f.stopEnd.date}T${f.stopEnd.hour}`);
                stopMs = Math.max(0, sE - sS);
                // Garante que o tempo de parada não exceda o tempo total
                stopMs = Math.min(stopMs, totalMs);
            }

            const effectiveMs = totalMs - stopMs;
            const effectiveHrs = effectiveMs / (1000 * 60 * 60);
            const rhythm = effectiveHrs > 0 ? (tons / effectiveHrs).toFixed(2) : 0;

            return {
                rhythm,
                effectiveHours: effectiveHrs.toFixed(2),
                stoppageHours: (stopMs / (1000 * 60 * 60)).toFixed(2),
                totalHours: totalHours.toFixed(2) // Adicionado totalHours
            };
        }

        // Nova função para atualizar apenas a UI da tela de beneficiamento
        function updateBeneficiamentoUI() {
            if (state.view !== 'beneficiamento') return; // Só atualiza se estiver na view correta

            const metrics = calculateMetrics();
            const isReady = (state.form.responsible.length > 2 && state.form.startTime.date && state.form.endTime.date && state.form.tonelagem > 0 && metrics?.rhythm > 0); // Adiciona verificação de tonelagem

            // Atualiza os elementos de exibição das métricas
            const rhythmDisplay = document.getElementById('rhythm-display');
            const totalHoursDisplay = document.getElementById('total-hours-display');
            const effectiveHoursDisplay = document.getElementById('effective-hours-display');
            const stoppageHoursDisplay = document.getElementById('stoppage-hours-display');
            const rhythmStatusMessage = document.getElementById('rhythm-status-message');
            const finalizeButton = document.getElementById('finalize-button');

            // Adiciona a atualização dos campos de data/hora que faltava
            const startDateInput = document.getElementById('start-date-input');
            const startTimeInput = document.getElementById('start-time-input');
            const endDateInput = document.getElementById('end-date-input');
            const endTimeInput = document.getElementById('end-time-input');
            const stopStartDateInput = document.getElementById('stop-start-date-input');
            const stopStartTimeInput = document.getElementById('stop-start-time-input');
            const stopEndDateInput = document.getElementById('stop-end-date-input');
            const stopEndTimeInput = document.getElementById('stop-end-time-input');

            if (startDateInput) startDateInput.value = state.form.startTime.date;
            if (startTimeInput) startTimeInput.value = state.form.startTime.hour;
            if (endDateInput) endDateInput.value = state.form.endTime.date;
            if (endTimeInput) endTimeInput.value = state.form.endTime.hour;
            if (stopStartDateInput) stopStartDateInput.value = state.form.stopStart.date;
            if (stopStartTimeInput) stopStartTimeInput.value = state.form.stopStart.hour;
            if (stopEndDateInput) stopEndDateInput.value = state.form.stopEnd.date;
            if (stopEndTimeInput) stopEndTimeInput.value = state.form.stopEnd.hour;

            if (rhythmDisplay) rhythmDisplay.innerText = metrics?.rhythm || '0.0';
            if (totalHoursDisplay) totalHoursDisplay.innerText = `${metrics?.totalHours || '0.00'}h`;
            if (effectiveHoursDisplay) effectiveHoursDisplay.innerText = `${metrics?.effectiveHours || '0.00'}h`;
            if (stoppageHoursDisplay) stoppageHoursDisplay.innerText = `${metrics?.stoppageHours || '0.00'}h`;

            // Lógica para exibir mensagens de status do ritmo
            let message = '';
            if (!state.form.startTime.date || !state.form.endTime.date) {
                message = 'Preencha Início e Fim da Descarga.';
            } else if (state.form.tonelagem <= 0) {
                message = 'Informe a Tonelagem Beneficiada.';
            } else if (metrics?.totalHours <= 0) {
                message = 'Tempo de descarga inválido.';
            } else if (metrics?.effectiveHours <= 0 && metrics?.totalHours > 0) {
                message = 'Tempo efetivo de descarga é zero (parada total).';
            }

            if (rhythmStatusMessage) {
                rhythmStatusMessage.innerText = message;
                rhythmStatusMessage.classList.toggle('hidden', !message);
            }
            // Atualiza o estado do botão "CONCLUIR E SALVAR"
            if (finalizeButton) {

        async function finalizeBeneficiamento() {
            const metrics = calculateMetrics();
            const silo = state.selectedSiloId;
            
            const perfData = {
                ...metrics,
                responsavel: state.form.responsible,
                parada: state.form.stopReason || 'Nenhuma',
                inicio: `${state.form.startTime.date} ${state.form.startTime.hour}`,
                fim: `${state.form.endTime.date} ${state.form.endTime.hour}`,
                timestamp: new Date().getTime() // Adicionar timestamp para ordenação
            };

            const batch = db.batch();

            // 1. Atualizar o silo na coleção silosQueue
            const siloRef = db.collection('silosQueue').doc(silo);
            batch.update(siloRef, {
                statusBeneficiamento: 'Beneficiado',
                // Adiciona a tonelagem ao objeto de performance para consistência na edição
                performance: { ...perfData, tonelagem: state.form.tonelagem },
                lastUpdate: new Date().toISOString()
            });

            // 2. Adicionar o registro à coleção beneficiamentoRecords
            const recordRef = db.collection('beneficiamentoRecords').doc(); // ID auto-gerado pelo Firestore
            batch.set(recordRef, {
                id: recordRef.id, // Armazenar o ID do Firestore dentro do documento
                name: silo,
                cultivar: state.siloMap[silo].cultivar,
                tonelagem: state.form.tonelagem, // Usa a tonelagem do formulário para o registro
                umidade: state.siloMap[silo].umidade,
                performance: perfData,
                timestamp: perfData.timestamp
            });

            try {
                await batch.commit();
                state.view = 'dashboard';
                state.selectedSiloId = null;
            } catch (error) {
                console.error(`Erro ao finalizar beneficiamento para o silo ${silo}:`, error);
                state.errorMessage = { title: "Erro ao Finalizar", message: `Não foi possível finalizar o beneficiamento do silo ${silo} no Firebase.` };
                render();
            }
        }

        async function deleteBeneficiamentoRecord(recordId, siloName) {
            state.confirmation = {

                message: 'Deseja realmente excluir este registro de beneficiamento? Esta ação não pode ser desfeita.',
                icon: 'trash-2',
                color: 'bg-red-600',
                onConfirm: async () => {
                    const batch = db.batch();
                    // 1. Deletar o registro do histórico
                    const recordRef = db.collection('beneficiamentoRecords').doc(recordId);
                    batch.delete(recordRef);

                    // 2. Atualizar o silo na fila de trabalho para 'Irá Beneficiar' e limpar performance
                    const siloRef = db.collection('silosQueue').doc(siloName);
                    batch.update(siloRef, { statusBeneficiamento: 'Irá Beneficiar', performance: null });

                    try {
                        await batch.commit();
                    } catch (error) {
                        console.error("Erro ao excluir registro de beneficiamento:", error);
                        state.errorMessage = { title: "Erro de Exclusão", message: "Não foi possível excluir o registro de beneficiamento." };
                        render();
                    }
                }
            };
            render();

        function renderComparativeCharts() {
            const metrics = calculateGlobalMetrics();

            // Centralized chart destruction
            [
                dailyVolumeChartInstance, efficiencyGaugeChartInstance, rhythmByProductChartInstance, 
                performanceScatterChartInstance, siloComparisonRadarChartInstance, volumeByProductChartInstance
            ].forEach(chart => {

            if (state.view !== 'managementDashboard' || state.managementTab !== 'comparison') return;

            // Volume by Product Chart (Doughnut)
            const volumeByProductCtx = document.getElementById('volume-by-product-chart')?.getContext('2d');

                const data = metrics.volumeByCultivar.map(c => c[1]);

                const datasets = siloNames.map((siloName, index) => {

                        pointBackgroundColor: color,

                siloComparisonRadarChartInstance = new Chart(siloComparisonRadarCtx, {

        function renderManagementDashboard() {
            const tabs = [
                { id: 'global', icon: 'globe', label: 'Performance Global' },
                { id: 'comparison', icon: 'git-compare-arrows', label: 'Análise Comparativa' },
                { id: 'stoppages', icon: 'siren', label: 'Gestão de Paradas' },
                { id: 'siloDetail', icon: 'warehouse', label: 'Detalhe por Silo' },
                { id: 'shift', icon: 'sunrise', label: 'Produção por Turno' },
                { id: 'settings', icon: 'settings', label: 'Configurações' }
            ];

            return `
                <div class="min-h-screen bg-slate-100 font-sans text-slate-800 p-4 md:p-8 flex flex-col">

                                    case 'global': return renderGlobalPerformanceTab();
                                    case 'comparison': return renderComparativeAnalysisTab();
                                    case 'stoppages': return `<div class="text-center p-10"><h2 class="text-2xl font-bold text-slate-500">Conteúdo de Gestão de Paradas</h2></div>`;
                                    // Adicione os outros casos aqui
                                    case 'stoppages': return renderStoppagesTab();
                                    case 'siloDetail': return renderSiloDetailTab();
                                    case 'shift': return renderShiftProductionTab();

                                    default: return `<div class="text-center p-10"><h2 class="text-2xl font-bold">Aba em construção...</h2></div>`;
                                }

                    </main>
                </div>
            `;
        }
        // --- FIREBASE LISTENERS E CARREGAMENTO INICIAL ---
        let isLoadingSilos = true;
        let isLoadingRecords = true;

        function setupFirebaseListeners() {
            // Listener para a fila de silos
            db.collection('silosQueue').onSnapshot(snapshot => {
                const newSiloMap = {};
                snapshot.forEach(doc => {
                    newSiloMap[doc.id] = doc.data();
                });
                state.siloMap = newSiloMap;
                isLoadingSilos = false;
                render(); // Re-renderiza quando os dados dos silos chegam/atualizam
            }, error => {
                console.error("Erro ao buscar silosQueue:", error);
                state.errorMessage = { title: "Erro de Conexão", message: "Não foi possível carregar a fila de silos do Firebase." };
                isLoadingSilos = false;
                render();
            });

            // Listener para os registros de beneficiamento
            db.collection('beneficiamentoRecords').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                const newCompletedHistory = [];
                snapshot.forEach(doc => {
                    newCompletedHistory.push(doc.data());
                });
                state.completedHistory = newCompletedHistory;
                isLoadingRecords = false;
                render(); // Re-renderiza quando os dados dos registros chegam/atualizam
            }, error => {
                console.error("Erro ao buscar beneficiamentoRecords:", error);
                state.errorMessage = { title: "Erro de Conexão", message: "Não foi possível carregar o histórico de beneficiamento do Firebase." };
                isLoadingRecords = false;
                render();
            });
        }

        // --- RENDERIZADOR PRINCIPAL ---
        function render() { // Definição única da função render()
            const app = document.getElementById('app');

            if (isLoadingSilos || isLoadingRecords) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-slate-100">
                        <div class="text-center text-slate-500">
                            <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500 mx-auto mb-4"></div>
                            <p class="text-lg font-bold">Carregando dados do Firebase...</p>
                        </div>
                    </div>
                `;
            } else {
                if (state.view === 'dashboard') {
                    app.innerHTML = renderHeader() + renderDashboard();
                } else if (state.view === 'beneficiamento') {
                    app.innerHTML = renderBeneficiamento();
                } else if (state.view === 'managementDashboard') {
                    app.innerHTML = renderManagementDashboard();
                }
            }

            // Atraso para garantir que o DOM foi atualizado antes de renderizar os gráficos
            setTimeout(() => {
                if (state.view === 'managementDashboard') {
                    if (state.managementTab === 'global') renderGlobalCharts();
                    if (state.managementTab === 'comparison') renderComparativeCharts();
                    if (state.managementTab === 'stoppages') renderStoppagesCharts();
                    if (state.managementTab === 'siloDetail') renderSiloDetailCharts();
                    if (state.managementTab === 'shift') renderShiftProductionCharts();
                }
                lucide.createIcons();
            }, 0);

            // Gerenciamento do Modal de Erro
            if (state.errorMessage) {
                document.getElementById('error-title').innerText = state.errorMessage.title;
                document.getElementById('error-message').innerText = state.errorMessage.message;
                document.getElementById('error-silo').innerText = state.errorMessage.silo || '';
                document.getElementById('error-modal').classList.remove('hidden');
            } else {
                document.getElementById('error-modal').classList.add('hidden');
            }
            
            // Gerenciamento do Modal de Confirmação
            const confirmModal = document.getElementById('confirm-modal');
            if (state.confirmation.show) {
                document.getElementById('confirm-modal-title').innerText = state.confirmation.title;
                document.getElementById('confirm-modal-message').innerHTML = state.confirmation.message;
                document.getElementById('confirm-modal-icon').setAttribute('data-lucide', state.confirmation.icon);
                document.getElementById('confirm-modal-header').className = `p-6 text-white flex items-center gap-4 ${state.confirmation.color}`;
                document.getElementById('confirm-ok-btn').className = `w-full text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs transition-all ${state.confirmation.color}`;
                confirmModal.classList.remove('hidden');
                lucide.createIcons(); // Re-renderiza o ícone do modal
            } else {
                confirmModal.classList.add('hidden');
            }

            // Sincroniza o valor do input de pesquisa se necessário (se houver um)
            const searchInput = document.getElementById('search-input');
            if (searchInput) searchInput.value = state.searchTerm;
        }
        function handleConfirmation(confirmed) {
            if (confirmed && typeof state.confirmation.onConfirm === 'function') {
                state.confirmation.onConfirm();
            }
            // Reset confirmation state and hide modal
            state.confirmation = { show: false, onConfirm: () => {} };
            // No need to call render() here, as the modal is hidden directly by classList.add
            document.getElementById('confirm-modal').classList.add('hidden');
        }

        // Inicialização
        window.onload = () => {            
            auth.onAuthStateChanged(user => {
                if (user) {
                    // Usuário logado, pode carregar os dados
                    setupFirebaseListeners(); // Inicia o carregamento de dados e configura os listeners
                } else {
                    // Usuário não logado, redireciona para a página de login
                    window.location.href = 'login.html';
                }
            });
        };

    </script>

    <!-- Modal de Erro (Movido para fora do #app para ser sempre acessível) -->
    <div id="error-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-md w-full overflow-hidden">
            <div class="bg-red-600 p-6 text-white flex items-center gap-4">
                <i data-lucide="alert-circle" class="w-8 h-8"></i>
                <div>
                    <h3 id="error-title" class="text-xl font-black uppercase tracking-tight">Erro</h3>
                    <p id="error-silo" class="text-[10px] font-bold opacity-80 uppercase tracking-widest"></p>
                </div>
            </div>
            <div class="p-8 text-center">
                <p id="error-message" class="text-slate-600 font-medium mb-8"></p>
                <button onclick="document.getElementById('error-modal').classList.add('hidden'); state.errorMessage = null; render();" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Entendido</button>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] shadow-2xl max-w-md w-full overflow-hidden animate-fade-in-up">
            <div id="confirm-modal-header" class="p-6 text-white flex items-center gap-4">
                <i id="confirm-modal-icon" data-lucide="help-circle" class="w-8 h-8"></i>
                <div>
                    <h3 id="confirm-modal-title" class="text-xl font-black uppercase tracking-tight">Confirmar Ação</h3>
                </div>
            </div>
            <div class="p-8 space-y-8">
                <p id="confirm-modal-message" class="text-slate-600 font-medium text-center text-lg leading-relaxed"></p>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleConfirmation(false)" class="w-full bg-slate-200 text-slate-800 font-black py-4 rounded-2xl uppercase tracking-widest text-xs hover:bg-slate-300 transition-all">Cancelar</button>
                    <button id="confirm-ok-btn" onclick="handleConfirmation(true)" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs transition-all">Confirmar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
